<div th:fragment="autoReplyList">
    <div id="autoReplyConfiguration">
        <th:block th:each="inbox : ${inboxes}">
            <div th:replace="~{admin/fragments/auto-reply :: autoReply(${inbox}, ${autoReplyUrl})}"></div>
        </th:block>
    </div>
</div>

<div th:fragment="autoReply(inbox, autoReplyUrl)">
    <div class="ibox">
        <div class="ibox-title">
            <em class="fa fa-reply"></em> &nbsp; Automatisk svar - <th:block th:text="${inbox.organisationName}"></th:block>
        </div>
        <div class="ibox-content">
            <div class="d-flex mt-3" style="padding-left:15px;">
                <div class="ml-1 mr-2">
                    <input type="checkbox" class="i-checks auto-reply-toggle"
                           th:checked="${inbox.autoReplyEnabled}"
                           th:data-inbox="${inbox.eanIdentifier}"
                           onchange="toggleAutoReply(this)">
                </div>
                <label>Aktivér automatisk svar</label>
            </div>

            <div class="auto-reply-config"
                 th:id="'auto-reply-config-' + ${inbox.eanIdentifier}"
                 th:style="${inbox.autoReplyEnabled} ? '' : 'display:none;'">
                <div class="px-3 pt-3">
                    <div class="form-group">
                        <label>Emne</label>
                        <input type="text" class="form-control form-control-sm"
                               th:id="'auto-reply-subject-' + ${inbox.eanIdentifier}"
                               th:value="${inbox.autoReplySubject}"
                               placeholder="Emne for automatisk svar">
                    </div>
                    <div class="form-group">
                        <label>Besked</label>
                        <textarea class="form-control form-control-sm" rows="3"
                                  th:id="'auto-reply-message-' + ${inbox.eanIdentifier}"
                                  placeholder="Skriv din automatiske svartekst her..."><th:block th:text="${inbox.autoReplyMessage}"></th:block></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-sm-6">
                            <label>Startdato</label>
                            <input type="date" class="form-control form-control-sm"
                                   th:id="'auto-reply-start-' + ${inbox.eanIdentifier}"
                                   th:value="${inbox.autoReplyStartDate}">
                        </div>
                        <div class="form-group col-sm-6">
                            <label>Slutdato</label>
                            <input type="date" class="form-control form-control-sm"
                                   th:id="'auto-reply-end-' + ${inbox.eanIdentifier}"
                                   th:value="${inbox.autoReplyEndDate}">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end pb-3">
                        <button type="button" class="btn btn-primary btn-lg"
                                th:data-inbox="${inbox.eanIdentifier}"
                                th:data-url="${autoReplyUrl}"
                                onclick="saveAutoReply(this)">
                            Gem
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
